<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>RMS Audio Analyzer</title>
        <link rel="stylesheet" href="./style.css">
    </head>
    <body>
        <h1>RMS intesity Analyzer</h1>
        <div class="controls">
            <div class="control-group">
                <input type="file" id = "fileInput" accept="audio/*">
            </div>
        </div>

        <label for="lowerFrequency">Lower Frequency</label>
        <!-- 1. The input element with a unique ID -->
        <input type="text" id="lowerFrequency" placeholder="Type here...">

        <label for="upperFrequency">Upper Frequency:</label>
        <!-- 1. The input element with a unique ID -->
        <input type="text" id="upperFrequency" placeholder="Type here...">


        <div id="status"></div>

        <canvas id="canvas"></canvas>

        <script type = "module" src="script.js"></script>

    </body>
</html>
